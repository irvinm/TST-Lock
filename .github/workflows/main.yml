name: CI/CD

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Lint extension
      run: npm run lint
    - name: Run unit tests
      run: npm test
    - name: Build extension
      run: npm run build
    - uses: actions/upload-artifact@v4
      with:
        name: TST-Lock.xpi
        path: web-ext-artifacts/TST-Lock.xpi

